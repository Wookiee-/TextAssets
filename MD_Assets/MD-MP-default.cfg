//////==========   multiplayer default settings   =======//////

unbindall

//
// weapons
//
bind    1               "weapon 1"
bind    2               "weapon 2"
bind    3               "weapon 3"
bind    4               "weapon 4"
bind    5               "weapon 5"
bind    6               "weapon 6"
bind    7               "weapon 7"
bind    8               "weapon 8"
bind    9               "weapon 13"
bind    0               "weapon 9"
bind    -               "weapon 10"
bind    =               "weapon 0"


//
// CHARACTER CONTROLS
//

bind    CTRL            +attack
bind    ALT	        +altattack
bind    SHIFT 	     	+speed
bind    z  	        +strafe
bind    PGUP        	+lookup
bind    PGDN        	+lookdown
bind    END         	centerview
bind    c           	+movedown
bind    SPACE       	+moveup
bind    ENTER          	+use
bind    r               +button14


bind    UPARROW     +forward
bind    DOWNARROW   +back
bind    LEFTARROW   +left
bind    RIGHTARROW  +right
bind    w           +forward
bind    a           +moveleft
bind    s           +back
bind    d           +moveright
bind    ,           +moveleft
bind    .           +moveright

//
// FORCE POWERS
//

bind    F1	force_throw
bind    F2	force_pull
bind	F3	force_speed
bind	F4	force_seeing
bind	F5	force_heal
bind	F6	force_protect
bind	F7	force_absorb
bind	F8	force_distract
bind	F9	+force_grip
bind	F10	+force_lightning
bind	F11	force_rage
bind	F12	+force_drain
bind	\	force_forcepowerother
bind	]	force_healother


bind	f	+useforce
bind	e	forcenext
bind	q	forceprev

bind 	TAB   	+scores
bind 	INS   	scoresUp
bind    DEL   	scoresDown
bind 	p 	"cg_thirdperson !"
bind 	l	saberAttackCycle

//
// QUICK KEYS
//


//multi only
bind      KP_HOME       use_field

