//
// SP JEDI ACADEMY (MOVIE DUELS TC) DEFAULT CONFIG
//

unbindall

//
// WEAPONS
//
bind    1               "saberdown"

bind    F1               "weapon 1"
bind    F2               "weapon 2"
bind    F3               "weapon 3"
bind    F4               "weapon 4"

bind    mwheelup      	weapprev
bind    mwheeldown    	weapnext

//
// CHARACTER CONTROLS
//
bind    CTRL            +button13
bind    SHIFT           +speed
bind 	c 				"+button15"
bind    PGUP        	+lookup
bind    PGDN        	+lookdown
bind    END         	centerview
bind    ALT           	+movedown
bind    SPACE       	+moveup
bind    ENTER           +use
bind    r               +use
bind    x               reload
bind    u               "g_allowdualpistols !"
bind	t				taunt
bind	g				flourish
bind	v				gloat
bind	m				meditate
bind	b				bow
bind	n				surrender

bind    w           	+forward
bind    a           	+moveleft
bind    s          		+back
bind    d           	+moveright

//
// FORCE POWERS
//

bind 	2 	force_heal
bind    3	force_throw
bind    4	force_pull
bind	5	force_sight

bind	f	+useforce
bind	e	forcenext
bind	q	forceprev

bind 	TAB     datapad
bind 	p 	"cg_thirdperson !"
bind 	l	saberAttackCycle

//
// INVENTORY
//

bind    ,	invprev
bind    .	invnext
bind	/	invuse

//
// QUICK KEYS
//

//single only
bind    F9            "load quick"
bind    F10           "uimenu ingameloadmenu"
bind    F11           "uimenu ingamesavemenu"
bind    F12           "save quick"

bind 	6 	"uimenu ingameforcewheelMenu"
bind 	7 	"uimenu ingameweaponwheelMenu"
bind 	8 	"uimenu ingamecharacter"
bind 	9 	"uimenu ingamesabercustomizationMenu"
bind 	0 	"uimenu ingamespawncommandsMenu"
bind 	- 	"vstr npc_recent_command"
bind	= 	"vstr npc_spawn_recent"
bind 	k 	"d_npcfreeze !"

//
// MOUSE BUTTONS
//

bind    MOUSE1      +attack
bind    MOUSE2      +altattack
bind    MOUSE3      saberAttackCycle


//
// CLIENT ENVIRONMENT COMMANDS
//

bind    ~           "toggleconsole"
bind    `           "toggleconsole"

//
// JOYPAD COMMANDS
//

bind "JOY1" "+moveup"
bind "JOY2" "+useforce"
bind "JOY3" "+movedown"
bind "JOY4" "weapon 1"
bind "JOY5" "+button13"
bind "JOY6" "+attack"
bind "JOY8" "+use"
bind "JOY10" "+altattack"
bind "JOY17" "+speed"
bind "JOY18" "+left"
bind "JOY19" "+right"
bind "JOY20" "+lookup"
bind "JOY21" "+lookdown"
bind "JOY23" "+button14"
bind "JOY28" "forcenext"
bind "JOY29" "weapnext"
bind "JOY30" "saberdown"
bind "JOY31" "saberAttackCycle"

bind "PAD-A" "+moveup"
bind "PAD-B" "+useforce"
bind "PAD-X" "+movedown"
bind "PAD-Y" "weapon 1"
bind "PAD_BACK" "meditate"
bind "PAD_START" "+use"
bind "LEFTSTICK_CLICK" "+button15"
bind "RIGHTSTICK_CLICK" "+altattack"
bind "LEFTSHOULDER," "+button13"
bind "RIGHTSHOULDER" "+attack"
bind "DPAD_UP" "forcenext"
bind "DPAD_DOWN" "saberdown"
bind "DPAD_LEFT" "saberAttackCycle"
bind "DPAD_RIGHT" "weapnext"
bind "LEFTSTICK_LEFT" "+moveleft"
bind "LEFTSTICK_RIGHT" "+moveright"
bind "LEFTSTICK_UP" "+forward"
bind "LEFTSTICK_DOWN" "+back"
bind "RIGHTSTICK_LEFT" "+left"
bind "RIGHTSTICK_RIGHT" "+right"
bind "RIGHTSTICK_UP" "+lookup"
bind "RIGHTSTICK_DOWN" "+lookdown"
bind "LEFTTRIGGER" "+speed"
bind "RIGHTTRIGGER" "+button14"